global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'traefik'
    static_configs:
      - targets: ['gateway:8080']
  
  - job_name: 'core-service'
    static_configs:
      - targets: ['core-service:8000']
  
  - job_name: 'ingest-service'
    static_configs:
      - targets: ['ingest-service:8000']
